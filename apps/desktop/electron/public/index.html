<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBLE Desktop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- 顶部标题栏 -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M7 7h10M7 12h10M7 17h10M17 7l4-4M21 7l-4 4"/>
                    </svg>
                    <span>SmartBLE</span>
                </div>
                <div class="status-bar">
                    <div id="bluetoothStatus" class="status-indicator">
                        <span class="status-dot"></span>
                        <span class="status-text">初始化中...</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main">
            <!-- 标签页导航 -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="scan">
                    <span class="icon">📡</span>
                    <span>扫描设备</span>
                </button>
                <button class="tab-btn" data-tab="broadcast" id="broadcastTab" style="display: none;">
                    <span class="icon">📢</span>
                    <span>创建广播</span>
                </button>
            </div>

            <!-- 设备列表视图 -->
            <div id="deviceListView" class="view active">
                <div class="controls">
                    <button id="scanButton" class="btn btn-primary">
                        <span class="icon">🔍</span>
                        <span class="text">开始扫描</span>
                    </button>
                    <div id="deviceCount" class="device-count">发现 0 台设备</div>
                </div>

                <div id="deviceList" class="device-list">
                    <div class="empty-state">
                        <div class="empty-icon">📡</div>
                        <div class="empty-text">暂无设备</div>
                        <div class="empty-hint">点击上方按钮开始扫描</div>
                    </div>
                </div>
            </div>

            <!-- 广播视图 -->
            <div id="broadcastView" class="view">
                <div class="broadcast-container">
                    <div class="broadcast-card">
                        <div class="card-header">
                            <h3>创建 BLE 广播</h3>
                        </div>
                        <div class="card-body">
                            <div class="form-group">
                                <label>广播名称</label>
                                <input type="text" id="broadcastName" class="input" placeholder="MyDevice" value="SmartBLE">
                            </div>
                            <div class="form-group">
                                <label>服务 UUID</label>
                                <input type="text" id="broadcastServiceUuid" class="input" placeholder="FFF0" value="FFF0">
                                <small class="input-hint">自定义 128 位 UUID 或标准 16 位 UUID</small>
                            </div>
                            <div class="broadcast-status" id="broadcastStatus">
                                <span class="status-dot"></span>
                                <span class="status-text">未广播</span>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button id="startBroadcastButton" class="btn btn-primary">
                                <span class="icon">📢</span>
                                <span>开始广播</span>
                            </button>
                            <button id="stopBroadcastButton" class="btn btn-danger" style="display: none;">
                                <span class="icon">⏹</span>
                                <span>停止广播</span>
                            </button>
                        </div>
                    </div>

                    <div class="broadcast-info">
                        <h4>广播说明</h4>
                        <ul>
                            <li>设备将以设置的名称和 UUID 进行广播</li>
                            <li>其他设备可以通过扫描发现此广播</li>
                            <li>macOS 上可能需要额外权限</li>
                            <li>广播时无法扫描其他设备</li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 设备详情视图 -->
            <div id="deviceDetailView" class="view">
                <div class="detail-header">
                    <button id="backButton" class="btn btn-secondary">← 返回</button>
                    <div class="device-info">
                        <h2 id="deviceName">设备名称</h2>
                        <span id="deviceId" class="device-id">设备 ID</span>
                    </div>
                    <div id="connectionStatus" class="status-badge">未连接</div>
                </div>

                <div class="detail-controls">
                    <button id="clearLogsButton" class="btn btn-secondary">清空日志</button>
                    <button id="disconnectButton" class="btn btn-danger">断开连接</button>
                </div>

                <div id="servicesList" class="services-list">
                    <div class="loading-state">正在发现服务...</div>
                </div>

                <div id="logPanel" class="log-panel" style="display: none;">
                    <div class="log-header">
                        <span>操作日志</span>
                        <span id="logCount">0 条</span>
                    </div>
                    <div id="logList" class="log-list"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 写入数据对话框 -->
    <div id="writeDialog" class="dialog-overlay" style="display: none;">
        <div class="dialog">
            <div class="dialog-header">
                <h3>写入特征值</h3>
                <button class="dialog-close">×</button>
            </div>
            <div class="dialog-body">
                <div class="form-group">
                    <label>HEX 数据 (例: FF 01)</label>
                    <input type="text" id="writeDataInput" class="input" placeholder="FF 01 02">
                </div>
                <div class="format-toggle">
                    <label class="radio">
                        <input type="radio" name="format" value="hex" checked>
                        <span>HEX</span>
                    </label>
                    <label class="radio">
                        <input type="radio" name="format" value="utf8">
                        <span>UTF-8</span>
                    </label>
                </div>
            </div>
            <div class="dialog-footer">
                <button class="btn btn-secondary dialog-cancel">取消</button>
                <button class="btn btn-primary dialog-confirm">写入</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
