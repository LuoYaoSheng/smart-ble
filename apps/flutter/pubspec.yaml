name: smart_ble
description: Smart BLE - 跨平台蓝牙调试工具
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE 库
  flutter_blue_plus: ^1.32.0
  flutter_ble_peripheral: ^2.0.1

  # 状态管理
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  rxdart: ^0.27.7

  # UI 组件
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # 工具类
  permission_handler: ^11.1.0
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  url_launcher: ^6.3.2

  # 平台特定
  flutter_platform_widgets: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: false
  macos:
    generate: true
    image_path: "assets/images/icon.png"
  image_path: "assets/images/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/icon.png"
  android: true
  ios: false

# Flutter 配置
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
