name: Bug Report
description: Create a bug report to help us improve Smart BLE
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: dropdown
    id: platform
    attributes:
      label: Which platform did you experience the bug on?
      options:
        - Flutter (Android/iOS)
        - Tauri (Windows/macOS)
        - Electron
        - UniApp (WeChat MP)
        - STM32 Hardware
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How do we replicate the issue?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
