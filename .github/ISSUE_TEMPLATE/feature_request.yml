name: Feature Request
description: Suggest an idea for Smart BLE
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in improving Smart BLE!
  - type: dropdown
    id: platform
    attributes:
      label: Which platform does this apply to?
      options:
        - All Platforms (Cross-platform Core)
        - Flutter (Android/iOS)
        - Tauri (Windows/macOS)
        - Electron
        - UniApp (WeChat MP)
        - STM32 Hardware
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
