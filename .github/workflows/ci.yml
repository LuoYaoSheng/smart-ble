name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

  apple_and_tauri:
    name: Apple + Tauri
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Swift build
        working-directory: apps/ios
        run: swift build

      - name: Tauri cargo check
        working-directory: apps/desktop/tauri/src-tauri
        run: cargo check

  android:
    name: Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
