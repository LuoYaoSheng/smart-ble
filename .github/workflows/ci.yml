name: CI

on:
  push:
    branches:
      - main
      - master
      - refactor/multi-platform
  pull_request:

jobs:
  flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android:
    name: Android (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

  apple:
    name: iOS / macOS (swift build)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift build (iOS package)
        working-directory: apps/ios
        run: swift build

  tauri:
    name: Tauri (cargo check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        working-directory: apps/desktop/tauri/src-tauri
        run: cargo check

  electron:
    name: Electron (install + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop/electron
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/electron/package-lock.json

      - name: Install dependencies
        run: npm ci

  hardware:
    name: ESP32 firmware (PlatformIO)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        working-directory: hardware/esp32/LightBLE
        run: pio run
